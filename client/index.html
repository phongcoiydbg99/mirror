<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Mirror</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #canvas {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    #status {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #666;
      font-family: -apple-system, sans-serif;
      font-size: 18px;
      text-align: center;
    }
    #fullscreen-btn {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 32px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-family: -apple-system, sans-serif;
      cursor: pointer;
      z-index: 10;
    }
    #fullscreen-btn:active { background: #555; }
    .hidden { display: none !important; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/broadway-player@0.1.0/Player/Broadway/Decoder.js"></script>
</head>
<body>
  <div id="status">Connecting...</div>
  <canvas id="canvas" class="hidden"></canvas>
  <button id="fullscreen-btn">Enter Full Screen</button>

  <script>
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    const fullscreenBtn = document.getElementById('fullscreen-btn');

    // Try to initialize Broadway H264 decoder
    try {
      window.decoder = new Decoder({
        useWorker: false,
        webgl: 'auto'
      });

      window.decoder.onPictureDecoded = function(buffer, width, height, infos) {
        if (!canvas) return;
        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext('2d');
        const imageData = ctx.createImageData(width, height);

        // Broadway outputs YUV, convert to RGBA
        for (let i = 0; i < width * height; i++) {
          imageData.data[i * 4]     = buffer[i * 3];
          imageData.data[i * 4 + 1] = buffer[i * 3 + 1];
          imageData.data[i * 4 + 2] = buffer[i * 3 + 2];
          imageData.data[i * 4 + 3] = 255;
        }
        ctx.putImageData(imageData, 0, 0);

        // Show canvas once we have a decoded frame
        canvas.classList.remove('hidden');
        status.classList.add('hidden');
      };
    } catch(e) {
      console.warn('[h264] Broadway decoder not available:', e);
    }

    function connectVideo() {
      const wsUrl = `ws://${location.host}/video`;
      const ws = new WebSocket(wsUrl);
      ws.binaryType = 'arraybuffer';

      ws.onopen = function() {
        console.log('[h264] WebSocket connected');
        status.textContent = 'Connected (H264)';
      };

      ws.onmessage = function(event) {
        const data = new Uint8Array(event.data);
        // Parse length-prefixed NAL units
        let offset = 0;
        while (offset + 4 <= data.length) {
          const length = (data[offset] << 24) | (data[offset+1] << 16) | (data[offset+2] << 8) | data[offset+3];
          offset += 4;
          if (offset + length > data.length) break;

          const nalUnit = data.subarray(offset, offset + length);
          offset += length;

          // Feed to Broadway decoder if available
          if (window.decoder) {
            const startCode = new Uint8Array([0, 0, 0, 1]);
            const nalWithStartCode = new Uint8Array(4 + nalUnit.length);
            nalWithStartCode.set(startCode);
            nalWithStartCode.set(nalUnit, 4);
            window.decoder.decode(nalWithStartCode);
          }
        }
      };

      ws.onclose = function() {
        console.log('[h264] WebSocket closed, reconnecting...');
        status.textContent = 'Disconnected. Reconnecting...';
        status.classList.remove('hidden');
        canvas.classList.add('hidden');
        setTimeout(connectVideo, 2000);
      };

      ws.onerror = function() {
        ws.close();
      };
    }

    fullscreenBtn.addEventListener('click', () => {
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
      } else if (document.documentElement.webkitRequestFullscreen) {
        document.documentElement.webkitRequestFullscreen();
      }
      fullscreenBtn.classList.add('hidden');
    });

    // Auto-hide fullscreen button after entering fullscreen
    document.addEventListener('fullscreenchange', () => {
      if (document.fullscreenElement) {
        fullscreenBtn.classList.add('hidden');
      } else {
        fullscreenBtn.classList.remove('hidden');
      }
    });
    document.addEventListener('webkitfullscreenchange', () => {
      if (document.webkitFullscreenElement) {
        fullscreenBtn.classList.add('hidden');
      } else {
        fullscreenBtn.classList.remove('hidden');
      }
    });

    // Prevent sleep
    async function preventSleep() {
      try {
        if ('wakeLock' in navigator) {
          await navigator.wakeLock.request('screen');
        }
      } catch {}
    }

    preventSleep();
    connectVideo();
  </script>
</body>
</html>
