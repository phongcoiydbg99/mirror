<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Mirror</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #display {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    #status {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #666;
      font-family: -apple-system, sans-serif;
      font-size: 18px;
      text-align: center;
    }
    #fullscreen-btn {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 32px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-family: -apple-system, sans-serif;
      cursor: pointer;
      z-index: 10;
    }
    #fullscreen-btn:active { background: #555; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="status">Connecting...</div>
  <img id="display" class="hidden" alt="Mirror Display">
  <button id="fullscreen-btn">Enter Full Screen</button>

  <script>
    const display = document.getElementById('display');
    const status = document.getElementById('status');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    let retryTimeout = null;

    function connect() {
      status.textContent = 'Connecting...';
      status.classList.remove('hidden');

      display.src = '/stream?' + Date.now();

      display.onload = () => {
        display.classList.remove('hidden');
        status.classList.add('hidden');
      };

      display.onerror = () => {
        display.classList.add('hidden');
        status.textContent = 'Disconnected. Reconnecting...';
        status.classList.remove('hidden');
        retryTimeout = setTimeout(connect, 2000);
      };
    }

    fullscreenBtn.addEventListener('click', () => {
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
      } else if (document.documentElement.webkitRequestFullscreen) {
        document.documentElement.webkitRequestFullscreen();
      }
      fullscreenBtn.classList.add('hidden');
    });

    // Auto-hide fullscreen button after entering fullscreen
    document.addEventListener('fullscreenchange', () => {
      if (document.fullscreenElement) {
        fullscreenBtn.classList.add('hidden');
      } else {
        fullscreenBtn.classList.remove('hidden');
      }
    });
    document.addEventListener('webkitfullscreenchange', () => {
      if (document.webkitFullscreenElement) {
        fullscreenBtn.classList.add('hidden');
      } else {
        fullscreenBtn.classList.remove('hidden');
      }
    });

    // Prevent sleep
    async function preventSleep() {
      try {
        if ('wakeLock' in navigator) {
          await navigator.wakeLock.request('screen');
        }
      } catch {}
    }

    preventSleep();
    connect();
  </script>
</body>
</html>
